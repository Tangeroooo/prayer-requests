    <!-- SPA 라우팅을 위한 404 리다이렉트 처리 -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="text/javascript">
      (function() {
        var currentBuildId = '2026-04-17T02:52:59.844Z';
        var versionEndpoint = '/prayer-requests/build-info.json';
        var cacheParam = '__cv';
        var forcedReloadKey = 'prayer-requests:forced-build-id';

        var readUrl = function() {
          try {
            return new URL(window.location.href);
          } catch (error) {
            return null;
          }
        };

        var rewriteUrl = function(url) {
          window.history.replaceState(
            null,
            '',
            url.pathname + url.search + url.hash
          );
        };

        var stripCacheParam = function(expectedBuildId) {
          var url = readUrl();
          if (!url || !url.searchParams.has(cacheParam)) {
            return;
          }

          if (expectedBuildId && url.searchParams.get(cacheParam) !== expectedBuildId) {
            return;
          }

          url.searchParams.delete(cacheParam);
          rewriteUrl(url);
        };

        var readForcedReloadBuildId = function() {
          try {
            return window.sessionStorage.getItem(forcedReloadKey);
          } catch (error) {
            return null;
          }
        };

        var writeForcedReloadBuildId = function(buildId) {
          try {
            window.sessionStorage.setItem(forcedReloadKey, buildId);
          } catch (error) {
            // 세션 저장소를 못 써도 새로고침 플로우는 계속 진행한다.
          }
        };

        if (!currentBuildId || currentBuildId === 'dev' || !window.fetch) {
          stripCacheParam();
          return;
        }

        window.fetch(versionEndpoint + '?t=' + Date.now(), {
          cache: 'no-store',
        })
          .then(function(response) {
            if (!response.ok) {
              throw new Error('Failed to read build metadata');
            }
            return response.json();
          })
          .then(function(payload) {
            var latestBuildId = payload && payload.buildId;
            if (!latestBuildId) {
              stripCacheParam();
              return;
            }

            if (latestBuildId !== currentBuildId && readForcedReloadBuildId() !== latestBuildId) {
              var nextUrl = readUrl();
              if (!nextUrl) {
                return;
              }

              writeForcedReloadBuildId(latestBuildId);
              nextUrl.searchParams.set(cacheParam, latestBuildId);
              window.location.replace(nextUrl.toString());
              return;
            }

            stripCacheParam(latestBuildId);
          })
          .catch(function() {
            stripCacheParam();
          });
      }());
    </script>
